<script src="assets/vendor/mermaid.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", async () => {
    if (!window.mermaid) {
      return;
    }

    mermaid.initialize({
      startOnLoad: false,
      theme: "base",
      securityLevel: "loose",
      themeVariables: {
        primaryColor: "#DBEAFE",
        primaryBorderColor: "#2563EB",
        primaryTextColor: "#1E3A5F",
        lineColor: "#6B7280",
        secondaryColor: "#EFF6FF",
        tertiaryColor: "#F0F9FF",
        edgeLabelBackground: "#FFFFFF"
      }
    });

    const blocks = document.querySelectorAll("pre.mermaid, div.mermaid");
    for (const block of blocks) {
      const source = block.textContent || "";
      try {
        await mermaid.parse(source);
      } catch (error) {
        block.classList.add("mermaid-error");
        const message = document.createElement("div");
        message.className = "mermaid-error-message";
        message.textContent = `Mermaid syntax error: ${error?.message || error}`;
        block.insertAdjacentElement("afterend", message);
      }
    }

    await mermaid.run({ querySelector: "pre.mermaid, div.mermaid" });
  });
</script>
